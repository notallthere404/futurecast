# Default deployment

services:
  server:
    env_file: .env
    build:
      context: ./server
      dockerfile: Dockerfile
    image: futurecast-server:latest
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./config.yml:/app/config.yml
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped
    networks:
      - futurecast

