server:
  host: "0.0.0.0"
  port: 8000
  log_level: info
  # ext_db:                  # Falls back to DATABASE_URL env var

source:
  default:
    schedule: "* * * * *"
    trust: "medium"
    timeout_seconds: 30
    infer: ["events"]
    filter:
      - "content.len.gte.100"
      - "content.len.lte.5000"
  #   retry:
  #     max: 3
  #     backoff_ms: 500
  #     max_delay_ms: 30000

  rss:
    - name: "CISA"
      url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
      target: "description"     # content | description | link
      limit: 0                # 0 = no cap
      active: true
      trust: "high"
      # Optional override of any inherited default:
      # schedule: "*/30 * * * *"
      # filter: []

inference:
  mode: continuous
  type: zeroshot
  engine: transformers
  addr: http://inference:8080
  model: MoritzLaurer/deberta-v3-base-zeroshot-v2.0
  default:
    cutoff: 0.0
    top_n: 3
  events:
    - name: tactics
      prompt: "This text describes the tactic: {}"
      # instruction: ...     # LLM/api modes only; ignored by zeroshot
      # cutoff: 0.5          # overrides default.cutoff for this attribute
      # top_n: 5             # overrides default.top_n
      labels:
        - "Reconnaissance and Scanning"
        - "Resource Development and Infrastructure"
        - "Initial Access"
        - "Execution"
        - "Persistence and Account Controls"
        - "Privilege Escalation and Account Compromise"
        - "Exploitation and Vulnerabilities"
