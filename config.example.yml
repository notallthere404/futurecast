# ───────────── inference ─────────────
inference:
  # mode: continuous           # continuous | manual
  # type: zeroshot             # zeroshot | llm | api
  # engine: transformers       # self-hosted runtime; ignored for type=api
  # addr: "http://inference:8080"  # Python service base URL (zeroshot/llm)
  # model: "MoritzLaurer/deberta-v3-base-zeroshot-v2.0"

  # Required only when type=api. Endpoint must be OpenAI chat-completion
  # compatible. Bearer auth is set automatically from api_key.
  # api:
  #   endpoint: "https://openrouter.ai/api/v1"
  #   api_key: "${OPENROUTER_API_KEY}"
  #   model_override: ""       # empty = use top-level model

  # default:
  #   cutoff: 0.0              # drop labels below this score
  #   top_n: 3                 # cap labels returned per attribute

  # Dynamic top-level keys under inference: each one creates a
  # classification table named after the key. Source `infer:` entries
  # reference these names.
  # events:
  #   - name: tactic
  #     prompt: "{label}: {definition}"
  #     instruction: "Determine whether the document describes the following tactic."
  #     # cutoff: 0.5          # overrides default.cutoff for this attribute
  #     # top_n: 5             # overrides default.top_n
  #     labels:
  #       - name: "Reconnaissance"
  #         definition: "Pre-attack intelligence gathering."
  #       - name: "Initial Access"
  #         definition: "Gaining a foothold in the target environment."
  #       # Short-form (no definition) also works:
  #       # - "Persistence"
