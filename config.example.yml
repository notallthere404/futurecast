# FutureCast configuration. Every field is shown commented out; the
# server applies defaults for anything omitted. Copy to config.yaml and
# uncomment what you actually need.
#
# Resolution order: explicit Set > env var (FTC_ prefix) > config file
# > built-in default. ${VAR} expansion inside YAML strings is resolved
# at load time against the process environment.

# ───────────── server ─────────────
server:
  # host: "0.0.0.0"
  # port: 8000
  # log_level: "info"          # debug | info | warn | error
  # ext_db: ""                 # DSN; falls back to DATABASE_URL env var

